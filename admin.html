<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>

body{
font-family:Tahoma;
background:#f3f4f6;
margin:0;
direction:rtl;
}

header{
background:#111827;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
⚙️ لوحة التحكم
</header>

<div class="container">

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">

<button onclick="add()">إضافة</button>

<h3>المنتجات</h3>

<div id="list"></div>

</div>

<script>

if(localStorage.getItem("admin")!="true"){
location="login.html";
}

let products = JSON.parse(localStorage.getItem("products")) || [];

function show(){

let html="";

products.forEach((p,i)=>{

html+=`
<div class="product">
${p.name} - ${p.price}$ 
<button onclick="del(${i})">حذف</button>
</div>
`;

});

document.getElementById("list").innerHTML=html;

}

function add(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let image=document.getElementById("image").value;

products.push({name,price,image});

localStorage.setItem("products",JSON.stringify(products));

show();

}

function del(i){

products.splice(i,1);

localStorage.setItem("products",JSON.stringify(products));

show();

}

show();

</script>

</body>
</html>

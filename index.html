<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجري الإلكتروني</title>

<style>

body{
font-family:Tahoma;
background:#f3f4f6;
margin:0;
direction:rtl;
}

header{
background:#111827;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#10b981;
font-weight:bold;
margin:10px 0;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<header>
🛒 متجري الإلكتروني
</header>

<div class="container" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let html="";

products.forEach(p=>{

html+=`
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<div class="price">${p.price}$</div>
<button>شراء</button>
</div>
`;

});

document.getElementById("products").innerHTML=html;

</script>

</body>
</html>

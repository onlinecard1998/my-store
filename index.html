<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجري الإلكتروني</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
direction:rtl;
}

h1{
text-align:center;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h1>متجري الإلكتروني</h1>

<div id="products"></div>

<script>

fetch("products.json")
.then(response => response.json())
.then(data => {

let html = "";

data.forEach(product => {

html += `
<div class="product">
<h3>${product.name}</h3>
<p>السعر: ${product.price}$</p>
<button>شراء</button>
</div>
`;

});

document.getElementById("products").innerHTML = html;

});

</script>

</body>
</html>
